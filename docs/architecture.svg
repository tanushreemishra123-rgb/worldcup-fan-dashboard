<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" font-family="'Archivo',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1714"/><stop offset="1" stop-color="#08110f"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3ddc84"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f5c451"/>
    </marker>
  </defs>
  <rect width="920" height="620" fill="url(#bg)"/>
  <rect x="0" y="0" width="920" height="620" fill="none"/>

  <!-- title -->
  <text x="32" y="46" fill="#eaf2ee" font-size="26" font-weight="800" letter-spacing="1">WORLD CUP 26 · FAN PROTOTYPE — ARCHITECTURE</text>
  <text x="32" y="70" fill="#8aa79c" font-size="13">Single self-contained index.html · zero dependencies · offline-first</text>
  <g transform="rotate(-1.5 780 44)">
    <rect x="700" y="28" width="188" height="30" rx="6" fill="none" stroke="#ffb020" stroke-dasharray="5 4"/>
    <text x="794" y="48" fill="#ffb020" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">SAMPLE DATA · NOT FIFA</text>
  </g>

  <!-- Browser container -->
  <rect x="24" y="92" width="872" height="416" rx="16" fill="#0e1b18" stroke="rgba(120,200,170,.28)"/>
  <text x="44" y="120" fill="#3ddc84" font-size="13" font-weight="700" letter-spacing="2">BROWSER · index.html</text>

  <!-- UI layer -->
  <rect x="44" y="136" width="832" height="86" rx="12" fill="#12241f" stroke="rgba(120,200,170,.14)"/>
  <text x="60" y="160" fill="#eaf2ee" font-size="14" font-weight="700">UI LAYER · vanilla JS views</text>
  <g fill="#0e1b18" stroke="rgba(120,200,170,.28)">
    <rect x="60" y="172" width="150" height="34" rx="8"/>
    <rect x="222" y="172" width="150" height="34" rx="8"/>
    <rect x="384" y="172" width="176" height="34" rx="8"/>
    <rect x="572" y="172" width="150" height="34" rx="8"/>
    <rect x="734" y="172" width="126" height="34" rx="8"/>
  </g>
  <g fill="#cfe9dd" font-size="12.5" text-anchor="middle">
    <text x="135" y="194">Overview</text>
    <text x="297" y="194">Teams</text>
    <text x="472" y="194">Groups &amp; Results</text>
    <text x="647" y="194">Fan Profile</text>
    <text x="797" y="194">Support</text>
  </g>

  <!-- three lower layers -->
  <!-- DATA -->
  <rect x="44" y="242" width="258" height="240" rx="12" fill="#12241f" stroke="rgba(120,200,170,.14)"/>
  <text x="60" y="266" fill="#eaf2ee" font-size="14" font-weight="700">DATA LAYER</text>
  <rect x="60" y="280" width="226" height="52" rx="8" fill="#0e1b18" stroke="#1f7a4d"/>
  <text x="72" y="300" fill="#3ddc84" font-size="12.5" font-weight="700">Embedded snapshot</text>
  <text x="72" y="318" fill="#8aa79c" font-size="11">teams · groups · fixtures · standings</text>
  <rect x="60" y="342" width="226" height="46" rx="8" fill="#0e1b18" stroke="#8a6d1f"/>
  <text x="72" y="361" fill="#f5c451" font-size="12.5" font-weight="700">data/worldcup.json</text>
  <text x="72" y="377" fill="#8aa79c" font-size="11">committed fallback (canonical)</text>
  <rect x="60" y="398" width="226" height="46" rx="8" fill="#0e1b18" stroke="rgba(120,200,170,.28)" stroke-dasharray="5 4"/>
  <text x="72" y="417" fill="#cfe9dd" font-size="12" font-weight="700">public/open source (optional)</text>
  <text x="72" y="433" fill="#8aa79c" font-size="11">openfootball · refresh loader</text>

  <!-- STORE -->
  <rect x="316" y="242" width="258" height="240" rx="12" fill="#12241f" stroke="rgba(120,200,170,.14)"/>
  <text x="332" y="266" fill="#eaf2ee" font-size="14" font-weight="700">STORE LAYER</text>
  <rect x="332" y="286" width="226" height="60" rx="8" fill="#0e1b18" stroke="#1f7a4d"/>
  <text x="344" y="308" fill="#3ddc84" font-size="12.5" font-weight="700">Fan profiles + support</text>
  <text x="344" y="326" fill="#8aa79c" font-size="11">created without auth · seeded baseline</text>
  <rect x="332" y="356" width="226" height="44" rx="8" fill="#0e1b18" stroke="rgba(120,200,170,.28)"/>
  <text x="344" y="375" fill="#cfe9dd" font-size="12" font-weight="700">localStorage</text>
  <text x="344" y="391" fill="#8aa79c" font-size="11">⇢ in-memory fallback if disabled</text>

  <!-- AI -->
  <rect x="588" y="242" width="288" height="240" rx="12" fill="#12241f" stroke="rgba(120,200,170,.14)"/>
  <text x="604" y="266" fill="#eaf2ee" font-size="14" font-weight="700">AI LAYER · grounded</text>
  <rect x="604" y="286" width="256" height="58" rx="8" fill="#0e1b18" stroke="#1f7a4d"/>
  <text x="616" y="308" fill="#3ddc84" font-size="12.5" font-weight="700">Local grounded engine (default)</text>
  <text x="616" y="326" fill="#8aa79c" font-size="11">summaries · recs · storylines — no key</text>
  <rect x="604" y="356" width="256" height="46" rx="8" fill="#0e1b18" stroke="#8a6d1f" stroke-dasharray="5 4"/>
  <text x="616" y="375" fill="#f5c451" font-size="12.5" font-weight="700">Hosted LLM (optional, keyed)</text>
  <text x="616" y="391" fill="#8aa79c" font-size="11">facts-only prompt · anti-hallucination</text>
  <path d="M732 402 L732 424 Q732 432 724 432 L636 432" fill="none" stroke="#f5c451" stroke-width="1.6" marker-end="url(#arrG)"/>
  <text x="616" y="452" fill="#f5c451" font-size="10.5">on failure ⇢ falls back to local engine</text>

  <!-- arrows: layers feed UI -->
  <path d="M173 242 L173 224" fill="none" stroke="#3ddc84" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M445 242 L445 224" fill="none" stroke="#3ddc84" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M732 242 L732 224" fill="none" stroke="#3ddc84" stroke-width="1.6" marker-end="url(#arr)"/>
  <!-- json -> embedded -->
  <path d="M173 342 L173 334" fill="none" stroke="#f5c451" stroke-width="1.6" marker-end="url(#arrG)"/>
  <!-- data -> ai (grounding) -->
  <path d="M286 306 L604 306" fill="none" stroke="#3ddc84" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="360" y="298" fill="#8aa79c" font-size="10.5">grounds every AI sentence</text>

  <!-- user flow footer -->
  <rect x="24" y="524" width="872" height="72" rx="14" fill="#0e1b18" stroke="rgba(120,200,170,.28)"/>
  <text x="44" y="548" fill="#3ddc84" font-size="12" font-weight="700" letter-spacing="1.5">USER PROFILE FLOW</text>
  <g font-size="12" fill="#cfe9dd">
    <text x="44" y="574">Explore teams</text>
    <text x="205" y="574">Open profile / AI briefing</text>
    <text x="420" y="574">Build fan card + pick team</text>
    <text x="645" y="574">Support count updates</text>
    <text x="820" y="574">Live charts</text>
  </g>
  <g stroke="#f5c451" stroke-width="1.4" marker-end="url(#arrG)" fill="none">
    <path d="M132 570 L198 570"/>
    <path d="M348 570 L412 570"/>
    <path d="M562 570 L638 570"/>
    <path d="M760 570 L812 570"/>
  </g>
</svg>
